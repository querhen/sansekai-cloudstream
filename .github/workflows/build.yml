name: Build Plugin
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧹 Total Reset & Classic Path
        run: |
          # Bersihkan total file lama
          rm -rf settings.gradle.kts build.gradle.kts SansekaiPlugin gradlew gradle .gradle
          
          # 1. Tulis Settings (Sangat Sederhana)
          cat << 'EOF' > settings.gradle.kts
          rootProject.name = "Sansekai"
          include(":SansekaiPlugin")
          EOF

          # 2. Tulis Root Build (Gunakan Jalur Klasik buildscript)
          cat << 'EOF' > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven(url = "https://jitpack.io")
              }
              dependencies {
                  classpath("com.github.lagradost:cloudstream-gradle:master-SNAPSHOT")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22")
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven(url = "https://jitpack.io")
              }
          }
          EOF

          # 3. Tulis Build Plugin (Hanya Apply Plugin)
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          cat << 'EOF' > SansekaiPlugin/build.gradle.kts
          apply(plugin = "com.android.library")
          apply(plugin = "kotlin-android")
          apply(plugin = "com.lagradost.cloudstream3.gradle")

          android {
              namespace = "com.querhen"
              compileSdk = 33
              defaultConfig { minSdk = 21 }
          }

          configure<com.lagradost.cloudstream3.gradle.CloudstreamExtension> {
              setPath("com.querhen.Sansekai")
              description = "Sansekai Provider"
          }
          EOF

          # 4. Tulis Kode Sansekai.kt
          cat << 'EOF' > SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt
          package com.querhen
          import com.lagradost.cloudstream3.*
          class Sansekai : MainAPI() {
              override var mainUrl = "https://api.sansekai.my.id"
              override var name = "Sansekai"
              override val hasMainPage = true
              override var lang = "id"
              override val supportedTypes = setOf(TvType.TvSeries, TvType.Movie)
              override suspend fun getMainPage(page: Int, request: MainPageRequest): HomePageResponse {
                  val response = app.get("$mainUrl/api/home").text
                  val data = entryGson.fromJson(response, Array<HomeResponse>::class.java).toList()
                  val homeItems = data.map { res ->
                      val movieData = res.items.map { item ->
                          MovieSearchResponse(item.title, item.url, this.name, TvType.TvSeries, item.poster, null, null)
                      }
                      HomePageList(res.category, movieData)
                  }
                  return HomePageResponse(homeItems)
              }
              data class HomeResponse(val category: String, val items: List<SearchResult>)
              data class SearchResult(val title: String, val url: String, val poster: String)
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: 🚀 Jalankan Pembangunan
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: 📦 Simpan Hasil
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

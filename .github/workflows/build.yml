name: Build Extensions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone extensions repo
        run: git clone https://github.com/recloudstream/cloudstream-extensions.git

      - name: Copy plugin
        run: |
          cp -r SansekaiDrama cloudstream-extensions/

      - name: Build extensions
        run: |
          cd cloudstream-extensions
          chmod +x gradlew
          ./gradlew make

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: cloudstream-extensions/build/plugins/*.cs3

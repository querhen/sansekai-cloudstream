name: Build and Deploy
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧹 Sapu Bersih & Tulis Ulang Proyek
        run: |
          # 1. Hapus semua file lama yang mungkin rusak
          rm -rf SansekaiPlugin Sansekai.kt settings.gradle.kts build.gradle.kts gradle gradlew .gradle
          
          # 2. Buat folder struktur yang benar
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          
          # 3. Tulis file settings.gradle.kts (Konfigurasi JitPack Utama)
          echo "pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri(\"https://jitpack.io\") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri(\"https://jitpack.io\") }
              }
          }
          rootProject.name = \"Sansekai\"
          include(\":SansekaiPlugin\")" > settings.gradle.kts

          # 4. Tulis file build.gradle.kts (Root)
          echo "plugins {
              id(\"com.lagradost.cloudstream3.gradle\") version \"6.0.2\" apply false
              kotlin(\"android\") version \"1.9.22\" apply false
          }" > build.gradle.kts

          # 5. Tulis file build.gradle.kts (Plugin)
          echo "import com.lagradost.cloudstream3.gradle.CloudstreamExtension
          plugins {
              id(\"com.android.library\")
              kotlin(\"android\")
              id(\"com.lagradost.cloudstream3.gradle\")
          }
          android {
              namespace = \"com.querhen\"
              compileSdk = 33
              defaultConfig { minSdk = 21 }
          }
          cloudstream {
              setPath(\"com.querhen.Sansekai\")
              description = \"Nonton Drama & ShortMax via Sansekai API\"
          }" > SansekaiPlugin/build.gradle.kts

          # 6. Tulis Kode Sansekai.kt
          cat << 'EOF' > SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt
          package com.querhen
          import com.lagradost.cloudstream3.*
          class Sansekai : MainAPI() {
              override var mainUrl = "https://api.sansekai.my.id"
              override var name = "Sansekai"
              override val hasMainPage = true
              override var lang = "id"
              override val supportedTypes = setOf(TvType.TvSeries, TvType.Movie)
              override suspend fun getMainPage(page: Int, request: MainPageRequest): HomePageResponse {
                  val response = app.get("$mainUrl/api/home").text
                  val data = entryGson.fromJson(response, Array<HomeResponse>::class.java).toList()
                  val homeItems = data.map { res ->
                      val movieData = res.items.map { item ->
                          MovieSearchResponse(item.title, item.url, this.name, TvType.TvSeries, item.poster, null, null)
                      }
                      HomePageList(res.category, movieData)
                  }
                  return HomePageResponse(homeItems)
              }
              data class HomeResponse(val category: String, val items: List<SearchResult>)
              data class SearchResult(val title: String, val url: String, val poster: String)
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: 🚀 Run Build
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: 📦 Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

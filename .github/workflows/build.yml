name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build plugin
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/libs/*.cs3        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: cloudstream-extensions/build/plugins/*.cs3

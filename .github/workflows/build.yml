name: Build Plugin
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Total Rebuild - Manual Path
        run: |
          # 1. Bersihkan sisa-sisa kegagalan
          rm -rf settings.gradle.kts build.gradle.kts SansekaiPlugin gradlew gradle .gradle
          
          # 2. Settings (Sangat Sederhana)
          echo 'rootProject.name = "Sansekai"' > settings.gradle.kts
          echo 'include(":SansekaiPlugin")' >> settings.gradle.kts

          # 3. Root Build (Gunakan Classpath Manual - Jalur Paling Aman)
          cat << 'EOF' > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven(url = "https://recloudstream.github.io/maven/")
              }
              dependencies {
                  classpath("com.lagradost:cloudstream3-gradle:6.0.2")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22")
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven(url = "https://recloudstream.github.io/maven/")
                  maven(url = "https://jitpack.io")
              }
          }
          EOF

          # 4. Folder & Build Plugin
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          cat << 'EOF' > SansekaiPlugin/build.gradle.kts
          apply(plugin = "com.android.library")
          apply(plugin = "kotlin-android")
          apply(plugin = "com.lagradost.cloudstream3.gradle")

          android {
              namespace = "com.querhen"
              compileSdk = 33
              defaultConfig {
                  minSdk = 21
              }
          }

          cloudstream {
              setPath("com.querhen.Sansekai")
              description = "Sansekai Provider"
          }
          EOF

          # 5. Sansekai.kt (Versi Super Stabil)
          cat << 'EOF' > SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt
          package com.querhen
          import com.lagradost.cloudstream3.*

          class Sansekai : MainAPI() {
              override var mainUrl = "https://api.sansekai.my.id"
              override var name = "Sansekai"
              override val hasMainPage = true
              override var lang = "id"
              override val supportedTypes = setOf(TvType.TvSeries, TvType.Movie)

              override suspend fun getMainPage(page: Int, request: MainPageRequest): HomePageResponse {
                  return HomePageResponse(listOf())
              }
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: 🚀 Jalankan Pembangunan
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: 📦 Simpan Hasil
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

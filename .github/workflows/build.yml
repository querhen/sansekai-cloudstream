name: Build and Deploy
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Fix Structure and Settings
        run: |
          # 1. Hapus semua file gradle yang bikin konflik
          rm -rf gradle gradlew gradlew.bat .gradle settings.gradle.kts build.gradle.kts
          
          # 2. Buat ulang settings.gradle.kts yang SEMPURNA
          echo 'pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          rootProject.name = "Sansekai"
          include(":SansekaiPlugin")' > settings.gradle.kts

          # 3. Buat ulang build.gradle.kts (Root) yang simpel
          echo 'plugins {
              id("com.lagradost.cloudstream3.gradle") version "6.0.2" apply false
              kotlin("android") version "1.9.22" apply false
          }' > build.gradle.kts

          # 4. Rapikan folder kode Sansekai
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: Build Plugin
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          

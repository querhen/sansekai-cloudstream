name: Build and Deploy
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Force Cleanup and Setup
        run: |
          # Bersihkan file sampah hasil error sebelumnya
          rm -rf gradle gradlew gradlew.bat
          
          # Buat struktur folder
          mkdir -p gradle/wrapper
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          
          # Download Wrapper dari link RAW (Pasti Script, Bukan HTML)
          curl -L "https://raw.githubusercontent.com/recloudstream/gradle-template/master/gradlew" -o gradlew
          curl -L "https://raw.githubusercontent.com/recloudstream/gradle-template/master/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          curl -L "https://raw.githubusercontent.com/recloudstream/gradle-template/master/gradle/wrapper/gradle-wrapper.properties" -o gradle/wrapper/gradle-wrapper.properties
          
          # Pastikan file gradlew tidak berisi HTML
          if grep -q "<!DOCTYPE html>" gradlew; then echo "Error: Downloaded HTML instead of script"; exit 1; fi
          
          chmod +x gradlew
          
          # Pindahkan Sansekai.kt ke tempat yang benar
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi

      - name: Build Plugin
        run: ./gradlew make --stacktrace

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

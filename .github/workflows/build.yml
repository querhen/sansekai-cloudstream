name: Build and Deploy
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Structure and Build
        run: |
          # 1. Rapikan folder Sansekai sesuai API M Yusril
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi
          
          # 2. Install Gradle secara manual di runner
          sudo apt-get update && sudo apt-get install gradle -y
          
          # 3. Jalankan build tanpa gradlew (Pakai sistem gradle)
          gradle make --stacktrace

      - name: Deploy to Gh-Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

name: Build and Deploy
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cleanup & Fix Structure
        run: |
          # Hapus sampah gradle lama
          rm -rf gradle gradlew gradlew.bat .gradle
          # Pastikan folder kode benar
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: Build Plugin
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          

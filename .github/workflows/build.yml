name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clone builder
        run: |
          git clone --depth 1 https://github.com/recloudstream/cloudstream-extensions.git

      - name: Copy plugin
        run: |
          cp -r SansekaiDrama cloudstream-extensions/

      - name: Build plugin
        run: |
          cd cloudstream-extensions
          chmod +x gradlew
          ./gradlew make

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: cloudstream-extensions/build/plugins/*.cs3

name: Build and Deploy
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Force Clean and Write Wrapper
        run: |
          # Bersihkan sampah
          rm -rf gradle gradlew gradlew.bat
          mkdir -p gradle/wrapper
          
          # Download file JAR biner (ini harus via curl)
          curl -L "https://github.com/recloudstream/gradle-template/raw/master/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          
          # Tulis file properties langsung
          echo "distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists" > gradle/wrapper/gradle-wrapper.properties

          # Tulis script gradlew langsung (agar tidak 404 lagi)
          curl -s https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
          chmod +x gradlew
          
          # Rapikan folder Sansekai
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi

      - name: Build Plugin
        run: ./gradlew make --stacktrace

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

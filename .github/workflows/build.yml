name: Build and Deploy
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Structure and Code
        run: |
          # 1. Bersihkan file lama agar tidak bentrok
          rm -rf SansekaiPlugin Sansekai.kt settings.gradle.kts build.gradle.kts
          
          # 2. Buat folder struktur yang benar
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          
          # 3. Buat file settings.gradle.kts (Pintu masuk JitPack)
          echo 'pluginManagement { repositories { google(); mavenCentral(); maven { url = uri("https://jitpack.io") } } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); maven { url = uri("https://jitpack.io") } } }
          rootProject.name = "Sansekai"
          include(":SansekaiPlugin")' > settings.gradle.kts

          # 4. Buat file build.gradle.kts (Root)
          echo 'plugins { id("com.lagradost.cloudstream3.gradle") version "6.0.2" apply false; kotlin("android") version "1.9.22" apply false }' > build.gradle.kts

          # 5. Buat file build.gradle.kts (Di dalam SansekaiPlugin)
          echo 'import com.lagradost.cloudstream3.gradle.CloudstreamExtension
          plugins { id("com.android.library"); kotlin("android"); id("com.lagradost.cloudstream3.gradle") }
          android { namespace = "com.querhen"; compileSdk = 33; defaultConfig { minSdk = 21 } }
          cloudstream { setPath("com.querhen.Sansekai"); description = "Provider Sansekai API" }' > SansekaiPlugin/build.gradle.kts

          # 6. Menulis ulang kode Sansekai.kt yang SEMPURNA (Anti-Error)
          cat << 'EOF' > SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt
          package com.querhen
          import com.lagradost.cloudstream3.*
          import com.lagradost.cloudstream3.utils.ExtractorLink
          import com.lagradost.cloudstream3.utils.loadExtractor
          class Sansekai : MainAPI() {
              override var mainUrl = "https://api.sansekai.my.id"
              override var name = "Sansekai"
              override val hasMainPage = true
              override var lang = "id"
              override val hasQuickSearch = true
              override val supportedTypes = setOf(TvType.TvSeries, TvType.Movie)
              override suspend fun getMainPage(page: Int, request: MainPageRequest): HomePageResponse {
                  val response = app.get("$mainUrl/api/home").text
                  val data = entryGson.fromJson(response, Array<HomeResponse>::class.java).toList()
                  val homeItems = data.map { res ->
                      val movieData = res.items.map { item ->
                          MovieSearchResponse(item.title, item.url, this.name, TvType.TvSeries, item.poster, null, null)
                      }
                      HomePageList(res.category, movieData)
                  }
                  return HomePageResponse(homeItems)
              }
              override suspend fun search(query: String): List<SearchResponse> {
                  val response = app.get("$mainUrl/api/search?q=$query").text
                  val results = entryGson.fromJson(response, Array<SearchResult>::class.java).toList()
                  return results.map { MovieSearchResponse(it.title, it.url, this.name, TvType.TvSeries, it.poster, null, null) }
              }
              override suspend fun load(url: String): LoadResponse {
                  val response = app.get(url).text
                  val res = entryGson.fromJson(response, MovieDetail::class.java)
                  return TvSeriesLoadResponse(res.title, url, this.name, TvType.TvSeries, res.episodes.map { Episode(it.url, it.name, it.season, it.number) }, res.poster, res.year, res.plot)
              }
              override suspend fun loadLinks(data: String, isCasting: Boolean, subtitleCallback: (SubtitleFile) -> Unit, callback: (ExtractorLink) -> Unit): Boolean {
                  loadExtractor(data, subtitleCallback, callback)
                  return true
              }
          }
          data class HomeResponse(val category: String, val items: List<SearchResult>)
          data class SearchResult(val title: String, val url: String, val poster: String)
          data class MovieDetail(val title: String, val poster: String, val year: Int?, val plot: String?, val episodes: List<EpisodeDetail>)
          data class EpisodeDetail(val name: String, val url: String, val season: Int?, val number: Int?)
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: Build Plugin
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

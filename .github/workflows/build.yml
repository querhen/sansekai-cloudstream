      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew make --stacktrace

      - name: Check Build Folder
        run: |
          ls -R build || echo "Folder build tidak ditemukan!"
          # Baris ini memastikan folder build ada agar tidak error saat deploy
          mkdir -p build 

      - name: Deploy to Github Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

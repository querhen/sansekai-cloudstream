name: Build and Deploy
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean & Reset Configuration
        run: |
          # 1. Hapus sisa sampah
          rm -rf gradle gradlew gradlew.bat .gradle settings.gradle.kts build.gradle.kts
          
          # 2. Buat Settings & Root Build yang segar
          echo 'pluginManagement { repositories { google(); mavenCentral(); maven { url = uri("https://jitpack.io") } } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); maven { url = uri("https://jitpack.io") } } }
          rootProject.name = "Sansekai"
          include(":SansekaiPlugin")' > settings.gradle.kts

          echo 'plugins { id("com.lagradost.cloudstream3.gradle") version "6.0.2" apply false; kotlin("android") version "1.9.22" apply false }' > build.gradle.kts

          # 3. Reset file Build di dalam folder SansekaiPlugin agar tidak typo
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          echo 'import com.lagradost.cloudstream3.gradle.CloudstreamExtension
          plugins { id("com.android.library"); kotlin("android"); id("com.lagradost.cloudstream3.gradle") }
          android { namespace = "com.querhen"; compileSdk = 33; defaultConfig { minSdk = 21 } }
          cloudstream { setPath("com.querhen.Sansekai"); description = "Provider Sansekai API" }' > SansekaiPlugin/build.gradle.kts

          # 4. Pindahkan file kode utama ke folder yang seharusnya
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-disabled: true

      - name: Build Plugin
        run: gradle :SansekaiPlugin:make --stacktrace --no-daemon

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

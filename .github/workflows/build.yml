name: Build and Deploy
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Force Cleanup and Setup
        run: |
          # Menghapus file/folder gradle yang konflik
          rm -rf gradle 
          rm -f gradlew
          
          # Membuat ulang struktur folder yang benar
          mkdir -p gradle/wrapper
          mkdir -p SansekaiPlugin/src/main/kotlin/com/querhen
          
          # Pindahkan Sansekai.kt ke folder yang benar agar terbaca compiler
          if [ -f Sansekai.kt ]; then mv Sansekai.kt SansekaiPlugin/src/main/kotlin/com/querhen/Sansekai.kt; fi
          
          # Download Wrapper Resmi
          curl -L https://github.com/recloudstream/gradle-template/raw/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -L https://github.com/recloudstream/gradle-template/raw/master/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          curl -L https://github.com/recloudstream/gradle-template/raw/master/gradlew -o gradlew
          chmod +x gradlew

      - name: Build Plugin
        run: ./gradlew make --stacktrace

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          

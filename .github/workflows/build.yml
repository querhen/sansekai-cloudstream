name: Build Cloudstream Plugin

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clone Cloudstream Builder
        run: git clone https://github.com/recloudstream/cloudstream

      - name: Build Plugin
        run: |
          cd cloudstream
          chmod +x gradlew
          ./gradlew build

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: "**/*.cs3"
